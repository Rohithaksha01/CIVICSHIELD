<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Shield Portal</title>
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/pages/login.css">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/responsive.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <img src="../public/images/logo.png" class="logo">
            <span class="brand-text">CIVIC<br>SHIELD</span>

            <!-- HAMBURGER -->
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
        <div class="nav-right" id="navMenu">
            <a href="#" class="nav-link active">Home</a>
            <a href="#" class="nav-link">Services</a>
            <a href="#" class="nav-link">Contact</a>
        </div>
    </nav>

    <!-- LOGIN AREA -->

    <div class="container">

        <div class="login-card">

            <h2>Secure Portal Login</h2>


            <!-- ROLE TABS -->

            <div class="tabs">

                <button class="tab active" onclick="showLogin('citizen',this)">Citizen</button>
                <button class="tab" onclick="showLogin('officer',this)">Officer</button>
                <button class="tab" onclick="showLogin('admin',this)">Admin</button>

            </div>


            <!-- CITIZEN LOGIN -->

            <form id="citizen" class="login-form active">

                <div class="input-group">
                    <input type="email" required>
                    <label>Citizen Email</label>
                </div>

                <div class="input-group">
                    <input type="password" required>
                    <label>Password</label>
                </div>

                <button class="btn" type="submit">Citizen Login</button>

                <p class="register">
                    New Citizen? <a href="../pages/register.html">Register here</a>
                </p>

            </form>


            <!-- OFFICER LOGIN -->

            <form id="officer" class="login-form">

                <div class="input-group">
                    <input type="text" id="officerId" required>
                    <label>Officer ID</label>
                </div>

                <div class="input-group">
                    <input type="password" id="officerPassword" required>
                    <label>Officer Password</label>
                </div>

                <button class="btn" type="submit">Officer Login</button>

            </form>


            <!-- ADMIN LOGIN -->

            <form id="admin" class="login-form">

                <div class="input-group">
                    <input type="text" required>
                    <label>Admin Username</label>
                </div>

                <div class="input-group">
                    <input type="password" required>
                    <label>Admin Password</label>
                </div>

                <button class="btn" type="submit">Admin Login</button>

            </form>

        </div>

    </div>

    <script src="../scripts/core/layout.js"></script>
    <script src="../scripts/pages/login.js"></script>
    <script type="module" src="../scripts/login/script.js"></script>

</body>

</html>
