<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civic Shield – Voting</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="../styles/layout.css">

  <link rel="stylesheet" href="../styles/components/notifications.css">
  <link rel="stylesheet" href="../styles/components/toast.css">
  <link rel="stylesheet" href="../styles/components/health.css">

  <link rel="stylesheet" href="../styles/pages/voting.css">

  <link rel="stylesheet" href="../styles/responsive.css">
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="../public/images/logo.png" class="logo">
      <span class="brand-text">CIVIC<br>SHIELD</span>
      <span id="liveIndicator" class="live-indicator offline">● OFFLINE</span>

      <!-- HAMBURGER -->
      <button class="menu-toggle" id="menuToggle">☰</button>
    </div>

    <div class="nav-right" id="navMenu">
      <a href="../pages/dashboard.html" class="nav-link">Dashboard</a>
      <a href="../pages/welfare.html" class="nav-link">Welfare</a>
      <a href="../pages/voting.html" class="nav-link active">Voting</a>
      <a href="../pages/analytics.html" class="nav-link">Analytics</a>

      <div class="notification-wrapper">
        <span id="notifyBell" class="notify-bell">🔔</span>
        <span id="notifyCount" class="notify-count">0</span>
        <div id="notifyPanel" class="notify-panel">
          <h4>Notifications</h4>
          <ul id="notifyList"></ul>
        </div>
      </div>

      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <span class="toggle-thumb"></span>
      </button>
    </div>
  </nav>



  <!-- ===== PAGE CONTENT ===== -->
  <div class="page-content">
    <div class="welfare-box fade-in">
      <h2>Secure Voting System</h2>

      <input type="text" id="voterId" placeholder="Enter Voter ID">

      <select id="candidate">
        <option value="">Select Candidate</option>
        <option value="Candidate A">Candidate A</option>
        <option value="Candidate B">Candidate B</option>
        <option value="Candidate C">Candidate C</option>
      </select>

      <button onclick="castVote()">Verify & Cast Vote</button>

      <p class="status" id="status">Biometric verification required...</p>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer>
    © <span id="year"></span> Government of India | Civic Shield Platform<br>
    <small>Free • Fair • Secure Elections</small>
  </footer>

  <script src="../scripts/core/layout.js"></script>
  <script type="module" src="../scripts/app.js"></script>
  <script type="module" src="../scripts/core/offline.js"></script>
  <script type="module" src="../scripts/voting/castVote.js"></script>
  <script type="module" src="../scripts/pages/voting.js"></script>
  <script type="module" src="../scripts/core/theme.js"></script>

</body>

</html>
